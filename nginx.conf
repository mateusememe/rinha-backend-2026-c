worker_processes auto;
events {
    worker_connections 10240;
}
http {
    upstream backend {
        server api1:9001;
        server api2:9002;
        keepalive 128;
    }
    server {
        listen 9999;
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 1s;
        }
    }
}
